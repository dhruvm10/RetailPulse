version: '3.8'

services:
  dashboard:
    build: .
    container_name: retailpulse_dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - mlflow

  mlflow:
    image: python:3.11-slim
    container_name: retailpulse_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlruns/mlflow.db --default-artifact-root /mlruns"
