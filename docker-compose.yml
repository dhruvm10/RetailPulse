

services:
  dashboard:
    build: .
    container_name: retailpulse_dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - mlflow

  mlflow:
    image: python:3.11-slim
    container_name: retailpulse_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlruns/mlflow.db --default-artifact-root /mlruns"

  postgres:
    image: postgres:15-alpine
    container_name: retailpulse_postgres
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: password
      POSTGRES_DB: retailpulse
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: retailpulse_redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: retailpulse_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./mlops/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana-oss:latest
    container_name: retailpulse_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
