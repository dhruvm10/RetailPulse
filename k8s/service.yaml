apiVersion: v1
kind: Service
metadata:
  name: retailpulse-dashboard
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8501
  selector:
    app: retailpulse-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: retailpulse-mlflow
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: retailpulse-mlflow
